spring:
  application:
    name: reto-tecnico

  datasource:
    url: jdbc:postgresql://localhost:5432/reto-tecnico
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: YOUR_GOOGLE_CLIENT_ID
            client-secret: YOUR_GOOGLE_CLIENT_SECRET
            scope:
              - profile
              - email

jwt:
  secret: "dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yandidHRoYXRuZWVkc3RvYmU2NGNoYXJz"
  expiration-ms: 86400000


