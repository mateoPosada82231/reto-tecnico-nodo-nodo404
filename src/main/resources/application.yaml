spring:
  application:
    name: reto-tecnico

  datasource:
    url: jdbc:postgresql://localhost:5432/reto-tecnico
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
